name: Python and CMD checks

on:
  pull_request:
  push:
    branches:
      - main
      - "audit-*"

permissions:
  contents: read

jobs:
  linux-python:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Compile Python
        run: python -m compileall -q .
      - name: Run tests
        run: python -m pytest -q
      - name: Run offline integration check
        run: python system_check.py --quick

  windows-cmd:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install dependencies from CMD
        shell: cmd
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
      - name: Run full system check from CMD
        shell: cmd
        run: python windows_system_check.py
