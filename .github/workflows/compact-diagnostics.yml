name: Compact diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  compact-test:
    runs-on: ubuntu-24.04
    steps:
      - name: First failure
        env:
          SOURCE_BRANCH: ${{ github.head_ref }}
        run: |
          git clone -q --depth 1 --branch "$SOURCE_BRANCH" https://github.com/rktngkingads-cloud/WA-BOT-SISTEM.git source
          cd source
          python3 -m pip install -q -r requirements.txt
          python3 -m pytest -q -x --tb=line
