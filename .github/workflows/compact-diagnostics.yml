name: Compact diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  compact-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: First Linux failure
        env:
          SOURCE_BRANCH: ${{ github.head_ref }}
        run: |
          git clone -q --depth 1 --branch "$SOURCE_BRANCH" https://github.com/rktngkingads-cloud/WA-BOT-SISTEM.git source
          cd source
          python3 -m pip install -q -r requirements.txt
          python3 -m pytest -q -x --tb=line

  compact-windows:
    runs-on: windows-2025
    steps:
      - name: First Windows failure
        shell: cmd
        env:
          SOURCE_BRANCH: ${{ github.head_ref }}
        run: |
          git clone -q --depth 1 --branch "%SOURCE_BRANCH%" https://github.com/rktngkingads-cloud/WA-BOT-SISTEM.git source
          cd source
          python -m pip install -q -r requirements.txt
          python system_check.py
